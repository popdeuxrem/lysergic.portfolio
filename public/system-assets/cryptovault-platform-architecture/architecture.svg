<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <style>
      .bg{fill:#0B0F14}.node{fill:#111827;stroke:#8B5CF6;stroke-width:1.4}.ext{fill:#111827;stroke:#22D3EE;stroke-width:1.4;stroke-dasharray:7 5}.data{fill:#111827;stroke:#F59E0B;stroke-width:1.4}.inner{fill:none;stroke:#F59E0B;stroke-width:1}.text{fill:#E5E7EB;font:16px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.sub{fill:#9CA3AF;font:12px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.line{fill:none;stroke:#22D3EE;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round}.glow{stroke:#8B5CF6;stroke-opacity:.16;stroke-width:8;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1200" height="800"/>
  <text x="60" y="60" class="text">cryptovault-platform-architecture / architecture</text>
  <text x="60" y="84" class="sub">componentized application stack for wallet-oriented product delivery</text>

  <rect x="80" y="150" rx="14" ry="14" width="220" height="90" class="node"/>
  <text x="190" y="188" text-anchor="middle" class="text">UI Layer (Next.js)</text>
  <text x="190" y="210" text-anchor="middle" class="sub">pages + routing</text>

  <rect x="400" y="150" rx="14" ry="14" width="200" height="90" class="node"/>
  <text x="500" y="188" text-anchor="middle" class="text">Component System</text>
  <text x="500" y="210" text-anchor="middle" class="sub">reusable views</text>

  <rect x="720" y="150" rx="14" ry="14" width="180" height="90" class="node"/>
  <text x="810" y="188" text-anchor="middle" class="text">API Layer</text>
  <text x="810" y="210" text-anchor="middle" class="sub">server endpoints</text>

  <rect x="980" y="150" rx="14" ry="14" width="170" height="90" class="ext"/>
  <text x="1065" y="188" text-anchor="middle" class="text">Service Integrations</text>
  <text x="1065" y="210" text-anchor="middle" class="sub">third-party systems</text>

  <rect x="400" y="420" rx="14" ry="14" width="200" height="90" class="data"/>
  <rect x="408" y="428" rx="10" ry="10" width="184" height="74" class="inner"/>
  <text x="500" y="458" text-anchor="middle" class="text">State Management</text>
  <text x="500" y="480" text-anchor="middle" class="sub">client + shared state</text>

  <rect x="820" y="420" rx="14" ry="14" width="220" height="90" class="node"/>
  <text x="930" y="458" text-anchor="middle" class="text">Deployment Layer</text>
  <text x="930" y="480" text-anchor="middle" class="sub">runtime + delivery</text>

  <path class="glow" d="M300 195H400M600 195H720M900 195H980M500 240V420M810 240V330H930V420M600 465H820M300 195V330H500V420"/>
  <path class="line" d="M300 195H400M600 195H720M900 195H980"/>
  <path class="line" d="M500 240V420"/>
  <path class="line" d="M810 240V330H930V420"/>
  <path class="line" d="M600 465H820"/>
  <path class="line" d="M300 195V330H500V420"/>
  <text x="340" y="182" class="sub">compose</text>
  <text x="650" y="182" class="sub">invoke</text>
  <text x="930" y="182" class="sub">integrate</text>
  <text x="513" y="335" class="sub">bind</text>
  <text x="702" y="452" class="sub">deploy stateful app</text>
</svg>
