<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <style>
      .bg{fill:#0B0F14}.node{fill:#111827;stroke:#8B5CF6;stroke-width:1.4}.ext{fill:#111827;stroke:#22D3EE;stroke-width:1.4;stroke-dasharray:7 5}.data{fill:#111827;stroke:#F59E0B;stroke-width:1.4}.inner{fill:none;stroke:#F59E0B;stroke-width:1}.text{fill:#E5E7EB;font:16px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.sub{fill:#9CA3AF;font:12px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.line{fill:none;stroke:#22D3EE;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round}.glow{stroke:#8B5CF6;stroke-opacity:.16;stroke-width:8;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1200" height="800"/>
  <text x="60" y="60" class="text">repository-lifecycle-orchestrator / architecture</text>
  <text x="60" y="84" class="sub">deterministic policy enforcement for repository changes</text>

  <rect x="90" y="170" rx="14" ry="14" width="190" height="90" class="ext"/>
  <text x="185" y="208" text-anchor="middle" class="text">Developer Trigger</text>
  <text x="185" y="230" text-anchor="middle" class="sub">push / PR / dispatch</text>

  <rect x="360" y="170" rx="14" ry="14" width="210" height="90" class="node"/>
  <text x="465" y="208" text-anchor="middle" class="text">GitHub Actions Runner</text>
  <text x="465" y="230" text-anchor="middle" class="sub">job bootstrap</text>

  <rect x="650" y="120" rx="14" ry="14" width="200" height="90" class="node"/>
  <text x="750" y="158" text-anchor="middle" class="text">Policy Engine</text>
  <text x="750" y="180" text-anchor="middle" class="sub">rules + checks</text>

  <rect x="650" y="300" rx="14" ry="14" width="200" height="90" class="data"/>
  <rect x="658" y="308" rx="10" ry="10" width="184" height="74" class="inner"/>
  <text x="750" y="338" text-anchor="middle" class="text">Repo Config</text>
  <text x="750" y="360" text-anchor="middle" class="sub">versioned settings</text>

  <rect x="930" y="170" rx="14" ry="14" width="190" height="90" class="node"/>
  <text x="1025" y="208" text-anchor="middle" class="text">Enforcement Stage</text>
  <text x="1025" y="230" text-anchor="middle" class="sub">approve / block / patch</text>

  <rect x="930" y="490" rx="14" ry="14" width="190" height="90" class="data"/>
  <rect x="938" y="498" rx="10" ry="10" width="174" height="74" class="inner"/>
  <text x="1025" y="528" text-anchor="middle" class="text">Output Logs</text>
  <text x="1025" y="550" text-anchor="middle" class="sub">audit trail</text>

  <path class="glow" d="M280 215H360M570 215H610V165H650M570 215H610V345H650M850 165H890V215H930M1025 260V490"/>
  <path class="line" d="M280 215H360"/>
  <path class="line" d="M570 215H610V165H650"/>
  <path class="line" d="M570 215H610V345H650"/>
  <path class="line" d="M850 165H890V215H930"/>
  <path class="line" d="M850 345H890V215H930"/>
  <path class="line" d="M1025 260V490"/>
  <text x="320" y="202" class="sub">event</text>
  <text x="610" y="155" class="sub">evaluate</text>
  <text x="610" y="334" class="sub">load</text>
  <text x="886" y="202" class="sub">decision</text>
  <text x="1038" y="388" class="sub">emit</text>
