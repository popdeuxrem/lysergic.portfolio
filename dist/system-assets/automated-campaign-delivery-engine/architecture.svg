<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <style>
      .bg{fill:#0B0F14}.node{fill:#111827;stroke:#8B5CF6;stroke-width:1.4}.ext{fill:#111827;stroke:#22D3EE;stroke-width:1.4;stroke-dasharray:7 5}.data{fill:#111827;stroke:#F59E0B;stroke-width:1.4}.inner{fill:none;stroke:#F59E0B;stroke-width:1}.text{fill:#E5E7EB;font:16px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.sub{fill:#9CA3AF;font:12px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.line{fill:none;stroke:#22D3EE;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round}.glow{stroke:#8B5CF6;stroke-opacity:.16;stroke-width:8;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1200" height="800"/>
  <text x="60" y="60" class="text">automated-campaign-delivery-engine / architecture</text>
  <text x="60" y="84" class="sub">message assembly, delivery, and analytics feedback loop</text>

  <rect x="60" y="170" rx="14" ry="14" width="180" height="90" class="node"/>
  <text x="150" y="208" text-anchor="middle" class="text">Template Engine</text>
  <text x="150" y="230" text-anchor="middle" class="sub">content framing</text>

  <rect x="300" y="170" rx="14" ry="14" width="180" height="90" class="node"/>
  <text x="390" y="208" text-anchor="middle" class="text">Asset Embedder</text>
  <text x="390" y="230" text-anchor="middle" class="sub">inline assets</text>

  <rect x="540" y="170" rx="14" ry="14" width="180" height="90" class="node"/>
  <text x="630" y="208" text-anchor="middle" class="text">Message Builder</text>
  <text x="630" y="230" text-anchor="middle" class="sub">payload assembly</text>

  <rect x="790" y="170" rx="14" ry="14" width="180" height="90" class="ext"/>
  <text x="880" y="208" text-anchor="middle" class="text">Mailgun API</text>
  <text x="880" y="230" text-anchor="middle" class="sub">delivery provider</text>

  <rect x="760" y="440" rx="14" ry="14" width="200" height="90" class="data"/>
  <rect x="768" y="448" rx="10" ry="10" width="184" height="74" class="inner"/>
  <text x="860" y="478" text-anchor="middle" class="text">Delivery Logs</text>
  <text x="860" y="500" text-anchor="middle" class="sub">status records</text>

  <rect x="1010" y="440" rx="14" ry="14" width="160" height="90" class="node"/>
  <text x="1090" y="478" text-anchor="middle" class="text">Analytics Layer</text>
  <text x="1090" y="500" text-anchor="middle" class="sub">engagement metrics</text>

  <path class="glow" d="M240 215H300M480 215H540M720 215H790M880 260V440M960 485H1010"/>
  <path class="line" d="M240 215H300M480 215H540M720 215H790"/>
  <path class="line" d="M880 260V440"/>
  <path class="line" d="M960 485H1010"/>
  <text x="260" y="202" class="sub">render</text>
  <text x="500" y="202" class="sub">embed</text>
  <text x="740" y="202" class="sub">send</text>
  <text x="893" y="350" class="sub">log</text>
  <text x="972" y="472" class="sub">analyze</text>
</svg>
