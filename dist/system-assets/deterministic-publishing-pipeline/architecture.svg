<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="800" viewBox="0 0 1200 800">
  <defs>
    <style>
      .bg{fill:#0B0F14}.node{fill:#111827;stroke:#8B5CF6;stroke-width:1.4}.ext{fill:#111827;stroke:#22D3EE;stroke-width:1.4;stroke-dasharray:7 5}.data{fill:#111827;stroke:#F59E0B;stroke-width:1.4}.inner{fill:none;stroke:#F59E0B;stroke-width:1}.text{fill:#E5E7EB;font:16px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.sub{fill:#9CA3AF;font:12px ui-monospace,SFMono-Regular,Menlo,Monaco,Consolas,monospace}.line{fill:none;stroke:#22D3EE;stroke-width:1.3;stroke-linecap:round;stroke-linejoin:round}.glow{stroke:#8B5CF6;stroke-opacity:.16;stroke-width:8;fill:none}
    </style>
  </defs>
  <rect class="bg" width="1200" height="800"/>
  <text x="60" y="60" class="text">deterministic-publishing-pipeline / architecture</text>
  <text x="60" y="84" class="sub">validated build, deployment, verification, and notification</text>

  <rect x="70" y="170" rx="14" ry="14" width="180" height="90" class="ext"/>
  <text x="160" y="208" text-anchor="middle" class="text">Trigger</text>
  <text x="160" y="230" text-anchor="middle" class="sub">manual / API</text>

  <rect x="300" y="170" rx="14" ry="14" width="180" height="90" class="node"/>
  <text x="390" y="208" text-anchor="middle" class="text">Validation Stage</text>
  <text x="390" y="230" text-anchor="middle" class="sub">schema + checks</text>

  <rect x="530" y="170" rx="14" ry="14" width="180" height="90" class="node"/>
  <text x="620" y="208" text-anchor="middle" class="text">Build Step</text>
  <text x="620" y="230" text-anchor="middle" class="sub">reproducible output</text>

  <rect x="760" y="170" rx="14" ry="14" width="180" height="90" class="ext"/>
  <text x="850" y="208" text-anchor="middle" class="text">Vercel Deployment</text>
  <text x="850" y="230" text-anchor="middle" class="sub">immutable release</text>

  <rect x="530" y="440" rx="14" ry="14" width="220" height="90" class="node"/>
  <text x="640" y="478" text-anchor="middle" class="text">Post-deploy Verification</text>
  <text x="640" y="500" text-anchor="middle" class="sub">URL + health + smoke</text>

  <rect x="900" y="440" rx="14" ry="14" width="200" height="90" class="node"/>
  <text x="1000" y="478" text-anchor="middle" class="text">Notification Layer</text>
  <text x="1000" y="500" text-anchor="middle" class="sub">status fan-out</text>

  <rect x="80" y="440" rx="14" ry="14" width="220" height="90" class="data"/>
  <rect x="88" y="448" rx="10" ry="10" width="204" height="74" class="inner"/>
  <text x="190" y="478" text-anchor="middle" class="text">Release State</text>
  <text x="190" y="500" text-anchor="middle" class="sub">traceable metadata</text>

  <path class="glow" d="M250 215H300M480 215H530M710 215H760M850 260V350H640V440M640 530H1000M620 260V350H190V440"/>
  <path class="line" d="M250 215H300M480 215H530M710 215H760"/>
  <path class="line" d="M850 260V350H640V440"/>
  <path class="line" d="M640 530H1000"/>
  <path class="line" d="M620 260V350H190V440"/>
  <text x="270" y="202" class="sub">start</text>
  <text x="500" y="202" class="sub">validated</text>
  <text x="730" y="202" class="sub">deploy</text>
  <text x="703" y="338" class="sub">verify</text>
  <text x="795" y="518" class="sub">notify</text>
</svg>
